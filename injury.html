<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Injury Status Card</title>
<script>
  const CARD_VARIANT_CONFIG = {
    cardClass: "status-card",
    cssVars: {
      "--card-bg-top": "#5d231f",
      "--card-bg-bottom": "#351513",
      "--outer-border": "#220c0a",

      "--text-main": "#fff5f2",

        <div class="domain-label" id="domain-label"></div>
